/* ══════════════════════════════════════════════
   THE PLANNING QUEST — Shared Stylesheet
   All pages import this file
══════════════════════════════════════════════ */
:root{
  --bg:#07090e;--bg2:#0c0f18;--bg3:#111520;--bg4:#161c2a;
  --gold:#d4a017;--goldLt:#f0c040;--goldDim:#5c4108;
  --teal:#1fb8a8;--tealLt:#4dd9c8;
  --purple:#7c3aed;--purpleLt:#a855f7;
  --emerald:#059669;--emeraldLt:#10b981;
  --sky:#0ea5e9;--skyLt:#38bdf8;
  --red:#c0392b;--redLt:#e74c3c;
  --amber:#d97706;--amberLt:#fbbf24;
  --rose:#be185d;--roseLt:#f472b6;
  --border:rgba(212,160,23,.15);
  --white:#f0ead6;--dim:#5a6478;
  --r:10px;--sidebar:268px;--topbar:54px
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Pro',serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden}

/* ── Stars ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:.05}50%{opacity:var(--op,.6)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(212,160,23,.3)}50%{text-shadow:0 0 50px rgba(212,160,23,.55)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.3)}50%{box-shadow:0 0 0 8px rgba(212,160,23,0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}

/* ── Topbar ── */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar);background:rgba(7,9,14,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:200}
.tb-home{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--goldLt);text-decoration:none;display:flex;align-items:center;gap:9px;letter-spacing:.04em}
.tb-dot{width:8px;height:8px;border-radius:50%;background:var(--tealLt);animation:pulse 2s infinite}
.tb-sep{color:var(--goldDim,#5c4108)}
.tb-current{font-family:'Cinzel',serif;font-size:11px;color:var(--teal);letter-spacing:.04em;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-prog-wrap{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin:0 16px}
.tb-prog{height:100%;background:linear-gradient(90deg,var(--teal),var(--goldLt));border-radius:2px;transition:width .5s ease}
.tb-xp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--goldLt);white-space:nowrap}


/* ── Layout ── */
#shell{display:flex;padding-top:var(--topbar);min-height:100vh}

/* ── Sidebar ── */
#sb{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:var(--topbar);bottom:0;overflow-y:auto;z-index:100}
#sb::-webkit-scrollbar{width:3px}
#sb::-webkit-scrollbar-thumb{background:var(--goldDim);border-radius:2px}
.sb-hdr{padding:10px 16px 6px;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--goldDim);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.04)}
.sb-part{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:all .12s;text-decoration:none}
.sb-part:hover,.sb-part.active{background:rgba(212,160,23,.05)}
.sb-part-icon{font-size:14px;flex-shrink:0}
.sb-part-info{flex:1;min-width:0}
.sb-part-num{font-family:'Cinzel',serif;font-size:8.5px;font-weight:700;color:var(--goldDim);letter-spacing:.08em;text-transform:uppercase}
.sb-part-name{font-family:'Cinzel',serif;font-size:10.5px;color:var(--dim);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s}
.sb-part:hover .sb-part-name,.sb-part.active .sb-part-name{color:var(--goldLt)}
.sb-part-xp{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--goldDim);white-space:nowrap}
.sb-lesson{padding:7px 14px 7px 36px;font-size:12px;color:rgba(240,234,214,.35);cursor:pointer;border-left:2px solid transparent;display:flex;align-items:center;gap:8px;transition:all .12s;line-height:1.3;text-decoration:none}
.sb-lesson:hover{color:rgba(240,234,214,.65);background:rgba(255,255,255,.015)}
.sb-lesson.active{color:var(--goldLt);border-left-color:var(--goldLt);background:rgba(212,160,23,.06);font-weight:500}
.sb-lesson.done .sl-dot{background:var(--emeraldLt)}
.sl-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0;transition:background .2s}
.sb-tool-link{padding:8px 14px;display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--dim);cursor:pointer;transition:all .12s;border-left:2px solid transparent;text-decoration:none}
.sb-tool-link:hover,.sb-tool-link.active{color:var(--tealLt);background:rgba(31,184,168,.04);border-left-color:var(--tealLt)}

/* ── Main Content ── */
#main{margin-left:var(--sidebar);flex:1;min-width:0;position:relative;z-index:1}
#main::-webkit-scrollbar{width:4px}
#main::-webkit-scrollbar-thumb{background:var(--goldDim);border-radius:2px}
.lesson-wrap{max-width:820px;padding:36px 44px 100px;margin:0 auto;animation:fadeUp .3s ease}

/* ── Typography ── */
.page-title{font-family:'Cinzel',serif;font-size:28px;font-weight:700;line-height:1.2;margin-bottom:6px}
.page-sub{font-size:13px;color:rgba(240,234,214,.4);margin-bottom:28px;font-style:italic;padding-bottom:18px;border-bottom:1px solid var(--border)}
h2{font-family:'Cinzel',serif;font-size:17px;font-weight:600;color:var(--goldLt);margin:28px 0 12px;letter-spacing:.03em}
h3{font-family:'Cinzel',serif;font-size:13.5px;font-weight:600;color:var(--tealLt);margin:18px 0 8px;letter-spacing:.04em}
p{font-size:15px;line-height:1.82;color:rgba(240,234,214,.78);margin-bottom:12px}
strong{color:var(--white);font-weight:500}
ul,ol{padding-left:20px;margin-bottom:12px}
li{font-size:15px;line-height:1.78;color:rgba(240,234,214,.72);margin-bottom:4px}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;color:var(--tealLt)}

/* ── Narration ── */
.narration{background:linear-gradient(135deg,rgba(12,15,24,.95),rgba(17,21,32,.9));border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:20px 24px;margin:20px 0;position:relative}
.nar-lbl{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--gold);margin-bottom:8px;text-transform:uppercase}
.narration p{font-style:italic;color:rgba(240,234,214,.68);margin:0;font-size:14px;line-height:1.88}

/* ── Checklist ── */
.checklist{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin:20px 0}
.cl-title{font-family:'Cinzel',serif;font-size:10.5px;font-weight:700;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.cl-item{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;user-select:none}
.cl-item:last-child{border-bottom:none}
.cl-box{width:18px;height:18px;border-radius:4px;border:1.5px solid rgba(212,160,23,.25);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.cl-box.on{background:var(--emerald);border-color:var(--emerald);color:white}
.cl-text{font-size:13.5px;color:rgba(240,234,214,.6);line-height:1.6;transition:all .12s}
.cl-text.done{text-decoration:line-through;opacity:.35}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;margin:16px 0;border-radius:var(--r);border:1px solid var(--border)}
.dtbl{width:100%;border-collapse:collapse;font-size:13px}
.dtbl th{background:rgba(212,160,23,.06);color:var(--gold);padding:10px 13px;text-align:left;font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.04em;border-bottom:1px solid var(--border)}
.dtbl td{padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(240,234,214,.65);vertical-align:top;line-height:1.55}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr:hover td{background:rgba(255,255,255,.015)}

/* ── Callouts ── */
.callout{border-radius:var(--r);padding:14px 18px;margin:16px 0;font-size:14px;line-height:1.72}
.tip{background:rgba(5,150,105,.07);border:1px solid rgba(5,150,105,.22);color:rgba(240,234,214,.72)}
.warn{background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.25);color:rgba(240,234,214,.72)}
.danger{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.25);color:rgba(240,234,214,.72)}
.lore{background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.18);color:rgba(240,234,214,.68)}
.fpa{background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.22);color:rgba(240,234,214,.72)}
.ci{font-size:15px;margin-right:7px}

/* ── Code blocks ── */
.code-wrap{margin:16px 0}
.code-lbl{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--dim);margin-bottom:6px;text-transform:uppercase}
.code-block{background:#090d14;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.75;color:#a8d8ea;overflow-x:auto;white-space:pre}
.ck{color:#ff7b72}.cs{color:#a5d6ff}.cf{color:#d2a8ff}.cc{color:#6a737d}.cn{color:#79c0ff}.cm{color:#ffa657}

/* ── XP Badge ── */
.xp-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(212,160,23,.1),rgba(212,160,23,.04));border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-family:'Cinzel',serif;font-size:11px;color:var(--goldLt);margin-bottom:20px}

/* ── Battle card ── */
.battle-card{background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(11,14,22,.95));border:1px solid rgba(124,58,237,.3);border-radius:var(--r);padding:22px 26px;margin:20px 0}
.battle-lbl{font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;letter-spacing:.1em;color:var(--purpleLt);margin-bottom:8px;text-transform:uppercase}
.battle-title{font-family:'Cinzel',serif;font-size:14px;color:var(--white);margin-bottom:10px;font-weight:600}

/* ── Flow row ── */
.flow-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin:16px 0}
.flow-box{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:500;font-family:'Cinzel',serif;letter-spacing:.02em}
.flow-arr{color:var(--dim);font-size:14px}

/* ── Stage flow ── */
.stage-flow{display:flex;align-items:stretch;flex-wrap:wrap;gap:0;margin:16px 0;overflow:hidden;border-radius:var(--r);border:1px solid var(--border)}
.stage-box{flex:1;min-width:80px;padding:14px 8px;text-align:center;background:var(--bg3);border-right:1px solid var(--border)}
.stage-box:last-child{border-right:none}
.stage-icon{font-size:18px;display:block;margin-bottom:6px}
.stage-name{font-family:'Cinzel',serif;font-size:9px;font-weight:600;color:var(--dim);letter-spacing:.04em}
.stage-sub{font-size:10px;color:rgba(240,234,214,.3);margin-top:3px}

/* ── AI Tutor ── */
.tutor-box{background:linear-gradient(135deg,rgba(8,10,16,.98),rgba(17,21,32,.95));border:1px solid rgba(31,184,168,.18);border-radius:var(--r);padding:22px 26px;margin:28px 0}
.tutor-hdr{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.tutor-av{width:38px;height:38px;background:linear-gradient(135deg,var(--purple),var(--teal));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 0 20px rgba(31,184,168,.2)}
.tutor-nm{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--tealLt)}
.tutor-rl{font-size:11px;color:var(--dim)}
.tutor-desc{font-size:12.5px;color:rgba(240,234,214,.32);margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.chip{font-size:11px;padding:5px 13px;border:1px solid rgba(31,184,168,.18);border-radius:14px;background:transparent;color:rgba(240,234,214,.42);cursor:pointer;transition:all .12s;font-family:'Crimson Pro',serif}
.chip:hover{border-color:var(--tealLt);color:var(--tealLt);background:rgba(31,184,168,.07)}
.tutor-row{display:flex;gap:8px}
.tutor-input{flex:1;padding:9px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--white);font-size:13px;font-family:'Crimson Pro',serif;outline:none;transition:border-color .15s}
.tutor-input:focus{border-color:var(--teal)}
.tutor-input::placeholder{color:rgba(255,255,255,.18)}
.tutor-send{padding:9px 18px;background:linear-gradient(135deg,var(--teal),var(--sky));color:var(--bg);border:none;border-radius:8px;font-family:'Cinzel',serif;font-size:10.5px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:opacity .12s}
.tutor-send:hover{opacity:.85}
.tutor-out{margin-top:14px;font-size:14px;line-height:1.78;color:rgba(240,234,214,.68);min-height:0}
.tutor-out.loading{color:rgba(240,234,214,.28);font-style:italic}
.tutor-msg{background:var(--bg4);border-radius:8px;padding:12px 16px;margin-bottom:8px}
.tutor-msg.user-msg{background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.1)}
.tutor-msg.ai-msg{border:1px solid rgba(255,255,255,.05)}
.tutor-msg-lbl{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;opacity:.45}

/* ── Nav buttons ── */
.nav-btns{display:flex;justify-content:space-between;margin-top:48px;padding-top:20px;border-top:1px solid var(--border)}
.nav-btn{padding:10px 22px;font-family:'Cinzel',serif;font-size:11.5px;font-weight:600;letter-spacing:.05em;border-radius:8px;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:transparent;color:rgba(240,234,214,.4);text-decoration:none;display:inline-block}
.nav-btn:hover{border-color:var(--teal);color:var(--tealLt)}
.nav-btn.primary{background:linear-gradient(135deg,var(--teal),var(--sky));color:var(--bg);border-color:transparent}
.nav-btn.primary:hover{opacity:.88;transform:translateY(-1px)}
.nav-btn.gold{background:linear-gradient(135deg,var(--gold),#d97706);color:var(--bg);border-color:transparent}

/* ── FP&A challenge box ── */
.fpa-challenge{background:linear-gradient(135deg,rgba(190,24,93,.06),rgba(12,15,24,.97));border:1px solid rgba(190,24,93,.22);border-radius:var(--r);padding:22px 26px;margin:20px 0}
.fpa-badge{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--roseLt);text-transform:uppercase;margin-bottom:8px}
.fpa-title{font-family:'Cinzel',serif;font-size:14px;color:var(--white);font-weight:600;margin-bottom:10px}
.fpa-challenge p{font-size:14px;color:rgba(240,234,214,.68);line-height:1.78;margin-bottom:8px}

/* ── Boss card ── */
.boss-card{background:linear-gradient(135deg,rgba(212,160,23,.12),rgba(124,58,237,.08),rgba(12,15,24,.97));border:1px solid rgba(212,160,23,.3);border-radius:14px;padding:28px 32px;margin:20px 0;text-align:center}
.boss-title{font-family:'Cinzel',serif;font-size:22px;font-weight:900;color:var(--goldLt);margin-bottom:8px;animation:glow 3s infinite}

/* ── KPI cards ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0}
.kpi-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative}
.kpi-lbl{font-size:10px;color:var(--dim);margin-bottom:4px;font-family:'Cinzel',serif;letter-spacing:.04em;text-transform:uppercase}
.kpi-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--goldLt)}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:3px}
.kpi-trend{position:absolute;top:12px;right:12px;font-size:14px}

/* ── Responsive ── */
@media(max-width:860px){#sb{display:none}#main{margin-left:0}.lesson-wrap{padding:24px 20px 80px}}
@media(max-width:520px){.lesson-wrap{padding:20px 16px 80px}}

/* ── Topbar tools — scrollable on mobile, current page highlight ── */
.tb-tools{display:flex;gap:3px;margin-left:6px;overflow-x:auto;flex-shrink:0}
.tb-tools::-webkit-scrollbar{display:none}
.tb-tool{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Cinzel',serif;font-size:8.5px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:all .15s;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;white-space:nowrap}
.tb-tool:hover,.tb-tool.active{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.06)}
/* ── Sidebar global nav divider ── */
.sb-hdr.full-nav-hdr{margin-top:10px;border-top:1px solid rgba(255,255,255,.06);padding-top:10px;color:var(--teal);letter-spacing:.08em}

</style>
<style>
body{overflow-x:hidden}
#topbar-quiz{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(7,9,14,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;z-index:200}
.quiz-wrap{max-width:760px;margin:0 auto;padding:80px 32px 80px}
.quiz-hero{text-align:center;margin-bottom:40px}
.quiz-title{font-family:'Cinzel',serif;font-size:32px;font-weight:900;color:var(--goldLt);margin-bottom:8px;animation:glow 3s infinite}
.quiz-sub{font-size:15px;color:var(--dim);font-style:italic}
/* Filter pills */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;justify-content:center}
.fpill{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;letter-spacing:.07em;cursor:pointer;transition:all .15s;text-transform:uppercase}
.fpill:hover,.fpill.active{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.08)}
/* Progress */
.qprog-bar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:8px;overflow:hidden}
.qprog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--goldLt));border-radius:2px;transition:width .4s ease}
.qprog-meta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:24px}
/* Question */
.qcard{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:20px;animation:fadeUp .25s ease}
.qcat{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--teal);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.qtext{font-family:'Cinzel',serif;font-size:17px;color:var(--white);line-height:1.45;font-weight:600;margin-bottom:22px}
.qopts{display:flex;flex-direction:column;gap:10px}
.qopt{background:var(--bg4);border:1.5px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .18s;font-size:14.5px;color:rgba(240,234,214,.7);line-height:1.5;text-align:left}
.qopt:hover:not(.selected):not(.correct):not(.wrong){border-color:rgba(212,160,23,.3);background:rgba(212,160,23,.04);color:var(--white)}
.qopt.selected{border-color:rgba(212,160,23,.5);background:rgba(212,160,23,.06)}
.qopt.correct{border-color:var(--emerald);background:rgba(5,150,105,.1);color:var(--emeraldLt);cursor:default}
.qopt.wrong{border-color:var(--red);background:rgba(192,57,43,.08);color:var(--redLt);cursor:default}
/* Explanation */
.qexplain{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:0 10px 10px 0;padding:14px 18px;font-size:14px;color:rgba(240,234,214,.72);line-height:1.75;margin-top:16px;display:none}
/* Buttons */
.qbtns{display:flex;gap:12px;margin-top:18px;align-items:center}
.qbtn{padding:11px 28px;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.06em;border-radius:8px;cursor:pointer;transition:all .15s;border:none}
.qbtn.check{background:linear-gradient(135deg,var(--teal),var(--sky));color:var(--bg)}
.qbtn.check:hover{opacity:.88}
.qbtn.check:disabled{opacity:.4;cursor:default}
.qbtn.next{background:linear-gradient(135deg,var(--gold),#d97706);color:var(--bg);display:none}
.qbtn.next:hover{opacity:.88}
/* Score panel */
.score-panel{background:linear-gradient(135deg,rgba(212,160,23,.12),rgba(5,150,105,.06));border:1px solid rgba(212,160,23,.3);border-radius:14px;padding:40px;text-align:center;display:none;animation:fadeUp .3s ease}
.score-big{font-family:'Cinzel',serif;font-size:64px;font-weight:900;color:var(--goldLt);display:block;line-height:1}
.score-label{font-family:'Cinzel',serif;font-size:13px;color:var(--dim);letter-spacing:.1em;margin-top:6px;display:block}
.score-msg{font-size:16px;color:rgba(240,234,214,.65);margin:20px 0 28px;line-height:1.7}
.score-breakdown{display:flex;justify-content:center;gap:24px;margin-bottom:28px;flex-wrap:wrap}
.score-item{text-align:center}
.score-item-v{font-family:'Cinzel',serif;font-size:22px;font-weight:700}
.score-item-l{font-size:10px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.retry-btn{padding:14px 40px;background:linear-gradient(135deg,var(--teal),var(--sky));color:var(--bg);font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:.08em;border:none;border-radius:10px;cursor:pointer;transition:all .15s;margin-right:10px}
.retry-btn:hover{opacity:.88;transform:translateY(-1px)}
@media(max-width:600px){.quiz-wrap{padding:70px 16px 60px}.qcard{padding:20px 18px}.qtext{font-size:15px}}

<script>
(function(){var s=document.getElementById('stars');for(var i=0;i<80;i++){var d=document.createElement('div');d.className='star';var sz=Math.random()*2+0.4;d.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--delay:'+Math.random()*5+'s;--op:'+(0.15+Math.random()*0.4);s.appendChild(d);}})();

var ALL_Q=[
  {cat:'fundamentals',q:'What does BSO stand for in Oracle Essbase, and when is it used?',opts:['Binary Storage Option — for read-only large datasets','Block Storage Option — required for any cube needing write-back and planning input','Balanced Scorecard Output — for executive dashboards','Batch Sync Operation — for data loading jobs'],a:1,explain:'BSO (Block Storage Option) is the required cube type for any planning application where users enter data. It organises data in "blocks" defined by dense dimensions. ASO (Aggregate Storage Option) is faster for read-only analysis but does not support data entry.'},
  {cat:'fundamentals',q:'Which two dimensions are ALWAYS DENSE in a BSO Financial Planning cube, and why?',opts:['Entity and Scenario — most cells have data','Year and Currency — never have empty intersections','Account and Period — almost every account has a value in almost every time period','Version and Currency — define the planning scenarios'],a:2,explain:'Account and Period are dense because virtually every account has a value in every period. Dense dimensions define Essbase block structure — wrong dense/sparse choices create unnecessarily large blocks that waste memory and slow calculations by 10-50x.'},
  {cat:'fundamentals',q:'A planner receives "No data to display" when trying to enter data in the Actual scenario. What is the MOST LIKELY cause?',opts:['The application has not been refreshed recently','A Valid Intersection rule is blocking writes to the Actual scenario','The planner\'s browser cache needs clearing','The form is set to Quarter view instead of Month view'],a:1,explain:'Valid Intersections are the most common cause. The Actual scenario is typically loaded via Data Integration — planners should not write to it. Configuring a Valid Intersection that blocks planner groups from Actual is the correct architectural approach, not a bug.'},
  {cat:'fundamentals',q:'What is the "60% problem" that EPBCS solves for FP&A teams?',opts:['60% of EPBCS features go unused in most implementations','FP&A teams typically spend 60% of their time on data collection and reconciliation instead of analysis','60% of budget data is inaccurate in spreadsheet-based systems','60% of EPBCS users need significant training'],a:1,explain:'The "60% problem" describes how most FP&A teams spend 60% of their time on manual data collection, reconciliation, and spreadsheet maintenance — leaving only ~40% for actual financial analysis. EPBCS inverts this by automating data flows, consolidation, and reporting so analysts can analyse.'},
  {cat:'fundamentals',q:'Vision Corporation uses 6 currencies. When should Multi-Currency be enabled?',opts:['After the first data load — so you can verify single-currency data first','At application creation — it is extremely complex to enable after data exists','Only if consolidation is also enabled — they require each other','After all dimension hierarchies are built'],a:1,explain:'Multi-Currency must be enabled at application creation. Enabling it after data exists requires complex data migration — the currency dimension fundamentally changes how data is stored. This is one of the irreversible decisions listed in the Design Constraints document every EPBCS project should have.'},
  {cat:'metadata',q:'In EPBCS dimension hierarchy design, what does the consolidation operator "~" (tilde) mean?',opts:['Multiply the member value into the parent','Subtract the member value from the parent','Never Consolidate — the member does not roll up to its parent','Ignore this member in all calculations'],a:2,explain:'The tilde (~) operator means "Never Consolidate". The member exists in the dimension but does not roll into its parent. Common uses: memo/informational accounts, statistical ratios like Gross_Margin_Pct that should not be summed up the hierarchy, and placeholder members.'},
  {cat:'metadata',q:'What is the correct distinction between a UDA and an Attribute Dimension?',opts:['UDAs store numeric values; Attribute Dimensions store text','UDAs are Boolean flags on members; Attribute Dimensions have their own hierarchy enabling grouping and filtering','They are identical — UDA is just the older name for Attribute Dimension','UDAs are Account dimension only; Attributes work on all dimensions'],a:1,explain:'UDAs are simple Boolean flags — a member either has the tag or doesn\'t. Attribute Dimensions are separate dimensions with their own member hierarchy, allowing grouping and filtering by attribute values. Use UDAs for simple process tags (e.g., ALLOCATION_TARGET), use Attribute Dimensions when you need to group and aggregate by attribute values.'},
  {cat:'metadata',q:'CurPeriod substitution variable is set to "Mar". A form references &CurPeriod in its column definition. It\'s now April. What happens?',opts:['The form automatically detects the system date and shows April','The form still shows March columns — it uses the variable value, not the system date','The form shows a "Variable out of sync" error','The form shows YTD through March automatically'],a:1,explain:'Substitution variables are static until manually changed or updated via EPM Automate (epmautomate CLI). The form will continue to show March columns until an administrator updates CurPeriod to "Apr". This is why EPM Automate (epmautomate CLI) scripts that advance substitution variables at period-end are critical to production operations.'},
  {cat:'metadata',q:'You want a Groovy rule to process only "headcount-driven" expense accounts without hardcoding a list. What is the BEST design?',opts:['Create a separate cube with only headcount accounts','Build a Smart List lookup table with all account names','Assign a UDA "HEADCOUNT_DRIVER" to relevant accounts and filter by UDA in Groovy','Add naming prefix "HC_" to accounts and use string matching'],a:2,explain:'UDAs are designed for exactly this. When you add a new expense account, just add the UDA tag — zero code changes needed. The logic is self-documenting, there\'s no string parsing risk, and getMembersByUDA() makes it trivially simple in Groovy. Hardcoded lists or string matching are maintenance nightmares as the account hierarchy evolves.'},
  {cat:'groovy',q:'A Groovy rule writes 96 cells using setCell() inside a nested loop (8 entities × 12 months). What is the PERFORMANCE IMPACT and fix?',opts:['No impact — setCell() is auto-optimized for loops','96 individual network round-trips; fix by building a writes list and calling setDataCellValues() once','The rule throws a concurrent modification exception','You need CALC ALL for bulk writes, not Groovy'],a:1,explain:'Each setCell() call makes a separate network round-trip to Essbase. For 96 cells, the rule could take 10+ minutes. The fix: build a list of [member, member, ..., value] arrays and call operation.grid.setDataCellValues(writes) once — sending all 96 values in a single batch.'},
  {cat:'groovy',q:'What does this return: cube.getEssbaseCube().getMember("Entity","Total_Vision").getLevelZeroMembers()',opts:['Only the Total_Vision member itself','All members at level 2 of Entity dimension','All leaf-level (level 0) Entity members under Total_Vision — the lowest-level members with no children','All members with a UDA applied'],a:2,explain:'getLevelZeroMembers() returns all members at level 0 — the leaves of the hierarchy. These have no children. This is the standard pattern for iterating all planning entities in Groovy rules (allocations, validations, etc.).'},
  {cat:'groovy',q:'A validation rule checks 3 conditions. What is the CORRECT approach for user feedback?',opts:['Throw RuleStoppedException inside each if-block immediately when a condition fails','Run 3 separate rules, one per validation','Collect all errors in a List, check all 3 conditions, throw one RuleStoppedException with all messages joined','Use the Essbase debugger to show all errors simultaneously'],a:2,explain:'The collect-all-errors pattern is the correct UX approach. Throwing on the first error means the user must fix and resubmit repeatedly — terrible experience. Building an errors[] list, checking all conditions, then throwing once with all messages joined gives the user a complete picture of all issues at once.'},
  {cat:'groovy',q:'How do you read the Entity member from the current form\'s Point of View in Groovy?',opts:['String entity = formPOV.getEntity()','def entity = operation.grid.pov.find { it.dimensionName == "Entity" }.memberName','def entity = cube.getCurrentEntity()','def entity = FORM.POV["Entity"]'],a:1,explain:'operation.grid.pov returns the form\'s current Point of View as a list of dimension-member objects. Using .find { it.dimensionName == "Entity" }.memberName is the standard idiom. This is essential for rules that need to know which entity the form is currently showing.'},
  {cat:'groovy',q:'What is the PRIMARY reason to pre-fetch all data into a Map before computing allocations in Groovy?',opts:['Maps are required by the setDataCellValues API','Separating reads from writes allows Essbase to cache reads efficiently and eliminates the risk of reading partially-written data during the same rule run','Maps are faster than lists in Java/Groovy','The Groovy engine requires it for multi-threaded execution'],a:1,explain:'Separating reads from writes is a fundamental performance pattern. Reading first (into a Map) lets Essbase cache the read blocks. Writing second (batch) does not interfere with the reads. If you interleave reads and writes, you can accidentally read values you just wrote in the same rule run, creating incorrect allocation results.'},
  {cat:'workflow',q:'An approval planning unit is stuck "Under Review" because the reviewer is on leave. What is the correct admin action?',opts:['Delete and recreate the planning unit','Use Application → Manage Approvals to view all unit statuses and reassign/advance the stuck unit','Ask the reviewer to approve from mobile','Remove the reviewer from the planning unit hierarchy'],a:1,explain:'EPBCS Manage Approvals allows administrators to view all planning unit statuses and take actions including: changing status, reassigning reviewers, and forcing progression. This preserves the audit trail completely — no data is lost and the approval history remains intact.'},
  {cat:'workflow',q:'What is the key difference between "Approved" and "Locked" status in EPBCS approval workflow?',opts:['They are identical — Locked is just visual feedback for Approved','Approved = manager signed off; Locked = Finance frozen the data — even admins need to explicitly unlock before editing','Locked is a Groovy-only concept; Approved is the native state','Approved allows view access; Locked completely hides data'],a:1,explain:'Approved means the reviewer accepted the budget. Locked means Finance has frozen that planning unit\'s data — even administrators need to explicitly unlock it before any modifications. Build a Groovy rule that checks for Locked status and throws RuleStoppedException to enforce this programmatically.'},
  {cat:'reporting',q:'In Financial Reporting Studio, what is a "Row Template" and why is it valuable?',opts:['A preset colour scheme for P&L rows','A reusable row definition referenced across multiple reports — update once and all reports using it update automatically','A template that auto-generates rows from dimension members','A row configuration saved in Smart View'],a:1,explain:'Row Templates (and Column Templates) are reusable objects. By building a standard Income Statement Row Template, you can reference it across 20 different reports. When the account hierarchy changes, update the template once and all 20 reports update automatically. This is how professional EPBCS implementations maintain consistency at scale.'},
  {cat:'reporting',q:'A dashboard KPI shows $2.84B but the FRS report shows $2.82B for the same period. What are the top 3 things to check?',opts:['The FRS report cache needs clearing','Check: (1) calculation was run after last data load, (2) both are using the same Scenario/Version POV, (3) FRS may be pulling from a different Period member','The dashboard uses rounding while FRS shows exact numbers','FRS uses a different database connection'],a:1,explain:'Dashboard-report discrepancies are almost always: (1) data loaded but calc not re-run so derived members are stale, (2) different POV — dashboard may use Version:Working while FRS uses Version:Final, or (3) different period members (YTD vs Full_Year vs specific month). Always verify POV alignment first — it accounts for 80% of cases.'},
  {cat:'fpa',q:'Vision\'s CFO wants Zero-Based Budgeting for OpEx. What EPBCS configuration change is REQUIRED?',opts:['ZBB requires a separate EPBCS application','Create a "ZBB_Budget" Version under the Budget Scenario that starts with zero data — planners build from drivers, no prior year carryforward','Enable ZBB mode in Application Settings','Change all account formulas to default to zero'],a:1,explain:'ZBB in EPBCS uses a dedicated ZBB_Budget Version that starts with no seeded data (unlike traditional budgeting where prior year or last budget is copied as a starting point). Planners build all costs from scratch using driver-based forms. This coexists with the regular Budget and Forecast scenarios — no separate application needed.'},
  {cat:'fpa',q:'The CFO wants forecast accuracy metrics showing how accurate each monthly forecast was vs actuals. How do you build this natively in EPBCS?',opts:['Forecast accuracy requires a separate BI tool','Create a "Fcst_Accuracy_Pct" Account member with formula: (ABS(Actual-Forecast)/ABS(Actual))*100 and build a dashboard with this KPI','Export data to Excel and calculate accuracy there','Forecast accuracy is only available in Oracle Analytics Cloud'],a:1,explain:'EPBCS member formulas can calculate forecast accuracy natively. Standard formula: (ABS(Actual - Forecast) / ABS(Actual)) * 100 = MAPE (Mean Absolute Percentage Error). Build infolets showing rolling 3-month MAPE by entity. A MAPE of 5% means forecasts averaged within 5% of actuals — a standard FP&A centre of excellence KPI.'},
  {cat:'fpa',q:'Vision is planning an acquisition and wants to model 3 scenarios (Base, Optimistic, Pessimistic) without affecting the core budget. Best EPBCS approach?',opts:['Create 3 new EPBCS applications for the scenarios','Create 3 new Version members under Forecast Scenario (Acq_Base, Acq_Optimistic, Acq_Pessimistic) and seed from Working','Use Excel overlay with VLOOKUP to the EPBCS data','Create 3 new Entity members for the acquisition target'],a:1,explain:'EPBCS Versions are designed for exactly this. Under the Forecast Scenario, add 3 new Versions (Acq_Base, Acq_Optimistic, Acq_Pessimistic). Planners model acquisition financials in isolation; compare versions using FRS reports; the Working version remains untouched. This is the standard M&A scenario modelling pattern used across enterprises.'},
  {cat:'fpa',q:'During monthly close, Vision\'s benefits are 15% above budget across all US entities. Which EPBCS tool diagnoses the root cause FASTEST?',opts:['Run CALC ALL and check if the issue persists','Use Data Integration audit log to find when data changed','Open an Ad-Hoc Analysis grid showing the headcount driver and benefit accounts side-by-side, drill to entity level to find where headcount exceeded budget','Export all data to Excel and use VLOOKUP to compare'],a:2,explain:'Ad-Hoc Analysis is the fastest variance investigation tool. You can pivot freely across dimensions, drill from Total to entity level, add comparison columns (Budget vs Actual vs Prior Year) dynamically, and locate the exact entities and accounts causing the variance — in minutes, not hours. No exports, no VLOOKUPs, no waiting.'},

  {cat:'workflow',q:'What is a Planning Unit Hierarchy (PUH) and how is it structured for Vision Corporation?',opts:['A folder structure for organising forms and dashboards','A configuration defining the approval reviewer chain — Entity+Scenario combinations flow through manager levels to CFO','A security group hierarchy controlling dimension access','A hierarchy of Essbase calc scripts run in sequence'],a:1,explain:'The Planning Unit Hierarchy (PUH) defines who reviews which Entity+Scenario combination and in what order. For Vision Corporation: Level 1 = Department Manager (entity-level) → Level 2 = Finance Business Partner (regional) → Level 3 = CFO (all entities). Each Entity+Scenario+Year combination is one Planning Unit that progresses independently through the workflow.'},
  {cat:'workflow',q:'What are Valid Intersections and what is their most critical use in a Financial Planning application?',opts:['A form setting that highlights cells where data exists','A rule set blocking specific dimension combinations from data entry — most critically, preventing planners from writing to the Actual scenario','A calc script that validates cross-dimensional formulas','A report filter showing only valid member combinations'],a:1,explain:'Valid Intersections define which dimension combinations are allowed for data entry. The most critical use: blocking planners from writing to the Actual scenario, which is loaded via Data Integration, not entered manually. Without this guard, a planner can accidentally overwrite loaded actuals — a data integrity failure discovered at month-end, not before.'},
  {cat:'workflow',q:'A new budget cycle starts. Which sequence correctly sets up Vision\'s workflow before opening forms to planners?',opts:['Open forms → configure security → set up PUH → brief planners','Configure Valid Intersections → set up PUH with reviewer assignments → assign dimension security → seed data → open forms to planners','Seed data → open forms → configure PUH mid-cycle as needed','Set up PUH → open forms → configure security later'],a:1,explain:'Sequence is critical. Valid Intersections and security must be configured BEFORE planners access forms — otherwise they can write to wrong scenarios or see other entities\' data. PUH must be set up before submission begins. Seeding from prior year gives planners a starting point. Only then open forms. Mid-cycle security changes cause unpredictable access issues.'},
  {cat:'workflow',q:'What is the correct way to handle a Planning Unit stuck in "Under Review" when the assigned reviewer has left the company?',opts:['Delete the Planning Unit and recreate it with a new reviewer — all history is lost','Use Application → Manage Approvals to reassign the reviewer and force-advance the unit — audit trail is fully preserved','Ask another user to log in as the departed reviewer','Re-initialise the entire Planning Unit Hierarchy'],a:1,explain:'Manage Approvals is the correct administrative tool. It provides a global view of all planning unit statuses and allows: reassigning reviewers, force-advancing stuck units, and viewing full annotation history. The audit trail is fully preserved — no data is lost and approval history remains intact. This is the only non-destructive option.'},
  {cat:'workflow',q:'Why must data change auditing be enabled BEFORE the first budget cycle, and what happens if enabled mid-cycle?',opts:['It causes performance issues if enabled during active planning — must be done in advance','Enabling audit after data exists does not capture any historical changes — only future changes from the enable date are audited. Pre-cycle changes have no audit trail.','It requires a Refresh Database which resets all data','Audit trails are always available regardless of when the setting is enabled'],a:1,explain:'Application auditing records every data change with user, timestamp, old value, and new value. Critically, enabling it after planners have already entered data means those prior entries have zero audit trail. For SOX-compliant organisations, this is an audit finding. The rule: enable audit before any data is entered in the first planning cycle — treat it as an irreversible day-one configuration like time period settings.'},
  {cat:'workflow',q:'What does Segregation of Duties mean in the context of EPBCS SOX compliance?',opts:['Different users must approve each form before it can be saved','The person entering planning data must be different from the person approving it, who must be different from the Finance Admin with system access','Only Finance Admins can enter data to ensure accuracy','All data entries must be reviewed by a second user before saving'],a:1,explain:'SOX Segregation of Duties requires three distinct roles with no overlap: (1) Data Enterers (Planners — enter budget data), (2) Reviewers/Approvers (Managers — approve submitted data), (3) System Administrators (Finance Admin — manage the application and locks). The same person cannot be both a data enterer and their own approver. EPBCS enforces this through role-based access control and the approval workflow.'},
  {cat:'workflow',q:'In EPBCS security, what is the difference between Dimension Security and Valid Intersections?',opts:['They are the same feature with different names','Dimension Security controls which members a user can SEE (read/write access per member). Valid Intersections controls which combinations of members are allowed for DATA ENTRY regardless of who the user is.','Valid Intersections controls visibility; Dimension Security controls data entry','Dimension Security applies to forms; Valid Intersections applies to reports'],a:1,explain:'These are complementary but distinct. Dimension Security: an APAC planner assigned to Entity=Vision_APAC cannot see Vision_US or Vision_EU data at all — they are hidden. Valid Intersections: even if a user can see the Actual scenario, a Valid Intersection rule can prevent them from writing to it. Both layers work together. A well-designed implementation uses both: dim security for visibility, valid intersections for write protection.'},
  {cat:'workflow',q:'An administrator needs to prove to external auditors that the FY2025 Budget was approved by the CFO on November 15th. Where in EPBCS is this evidence?',opts:['In the Application Settings audit log','In Manage Approvals → Planning Unit History — shows every state change with user identity, timestamp, and annotations for every planning unit','In the Data Management audit trail','In the Job Console logs from the EPM Automate run'],a:1,explain:'Manage Approvals maintains a complete annotation history for every planning unit, including every state change (who changed it, when, from which state to which state, and any written annotation). This is the primary audit evidence for SOX. The CFO approval on November 15th will show as: Vision_US / Budget / FY2025 / Approved / CFO_Username / 2025-11-15 14:32. This is why enabling audit and using the formal workflow — not email chains — is essential for public companies.'},
  {cat:'reporting',q:'Financial Reporting Studio (FRS) reached end-of-life in 2025. What is the current Oracle-supported reporting tool for EPM Cloud, and what happened to FRS?',opts:['Smart View replaced FRS — all reports must be rebuilt in Smart View','Reports (the newer tool in EPM Cloud) is now the official standard. FRS still runs but receives zero bug fixes, zero enhancements, and Oracle Support will not fix any FRS issues.','FRS was enhanced with new features in 25.06','Dashboard 2.0 replaced FRS for all financial reporting'],a:1,explain:'As of 25.06, Oracle officially ended FRS development. Reports is the primary and only supported reporting solution for Cloud EPM. FRS still executes in existing environments but is frozen — no enhancements, no bug fixes. Any support case for FRS issues will be directed to reproduce in Reports. Finance teams still on FRS should migrate immediately, prioritising Board pack and variance reports.'},
  {cat:'reporting',q:'What is the key advantage of "Page of Pages" in Reports (the successor to FRS)?',opts:['It allows multiple charts on one page','One report job run generates a separate output for every member in a dimension — e.g. 12 entity P&Ls from one click, without manually running the report 12 times','It creates a table of contents automatically','It enables drill-through from summary to GL detail'],a:1,explain:'Page of Pages is one of the most valuable time-saving features in Reports. Configure the report once with a Page dimension pointing to Descendants(Total_Entity). One job run generates individual P&Ls for all 12 Vision Corporation entities simultaneously. Previously, Finance ran 12 separate reports manually. This single feature alone justifies migrating from FRS.'},
  {cat:'reporting',q:'Vision\'s CFO needs all 12 entity P&Ls showing Budget vs Actual vs Variance with unfavourable variances in red. Which sequence of steps in Reports Designer achieves this?',opts:['Build 12 separate reports, one per entity, with manual conditional formatting','Build one report with: Row Template (P&L hierarchy), Column Template (Budget/Actual/Variance%), Page dimension = Entity, Conditional Formatting rule (Variance% < 0 = red for revenue, reverse for expense), run with Page of Pages','Use Smart View to build the grid and export to PDF','Build in Dashboard 2.0 which has built-in conditional formatting'],a:1,explain:'The professional Reports pattern: (1) Row Template referencing the P&L account hierarchy — reusable across all 12 reports. (2) Column Template: Budget YTD, Actual YTD, Variance $, Variance %. (3) Page dimension = Entity (drives Page of Pages). (4) Conditional formatting: Variance% < 0 AND account is revenue type → red cell. (5) Run with Page of Pages → 12 formatted P&Ls in one job. Update the Row Template once when the account hierarchy changes — all 12 reports update automatically.'},
  {cat:'reporting',q:'What happened to Infolets in EPM Cloud from the October 2025 (25.10) update, and what should existing implementations do?',opts:['Infolets were enhanced with real-time data refresh capabilities','New infolet creation was blocked — existing infolets on the Home Page continue to function but cannot be created, copied, or added to Navigation Flows. Teams should plan to replace with Dashboard 2.0 KPI components.','All infolets were permanently deleted from all environments','Infolets were merged into the Dashboard 2.0 framework'],a:1,explain:'From 25.10, Oracle blocked: creating new infolets, using Copy As to duplicate infolets, and including infolets in Navigation Flows. Existing infolet dots on the Home Page continue to work — they were not deleted. However, with no path to create new ones, the practical direction is clear: migrate KPI displays to Dashboard 2.0 components. Teams with Navigation Flows that reference infolets should rebuild those flows without infolet dependencies before the next major cleanup.'},
  {cat:'reporting',q:'What is Narrative Reporting in Oracle EPM Cloud, and what specific problem does it solve for Finance teams during Board prep?',opts:['A tool for adding comments to individual cells in forms','A module combining live EPM data references with management narrative text in one document — when data changes, all cited figures auto-update, eliminating the "stale numbers in the Board deck" problem','A speech-to-text tool for dictating commentary','A template system for generating email reports'],a:1,explain:'Narrative Reporting solves the single most painful problem in Board pack preparation: the CFO reviews a draft, data changes, Finance manually hunts down every number reference in a 40-slide deck. With Narrative Reporting, cited figures are live references to EPM data. Change the underlying number and every reference in the narrative document updates automatically. For Vision Corporation with 12 entities and 5 scenarios, this eliminates 2 full days of manual number-checking from the monthly close process.'},
  {cat:'reporting',q:'Dashboard 2.0 received three new menu actions in the 25.06 update that were previously unavailable. What are they and why do they matter for migration from Dashboard 1.0?',opts:['Export to PDF, Email, and Print — basic output improvements','Analyze (ad-hoc pivot), Open in Smart View, and Spreadsheet Export — these three actions were the primary reasons Finance teams delayed migrating from Dashboard 1.0 to 2.0. Their addition removes the last major blocker.','Conditional formatting, drill-through, and member filtering — making 2.0 feature-parity with 1.0','Real-time refresh, auto-save, and version history'],a:1,explain:'The 25.06 update added Analyze, Open in Smart View, and Spreadsheet Export to Dashboard 2.0 grids. These three actions previously only existed within forms. Their absence was the primary technical objection Finance teams raised against migrating from Dashboard 1.0 — "we need to be able to open this in Smart View." That blocker is now removed. With 1.0 end-of-lived in 25.10, teams with this objection no longer have a valid technical reason to delay migration.'},
  {cat:'reporting',q:'What is the difference between "Reports" and "Management Reporting" in EPM Cloud, and when would you use each?',opts:['They are the same product with different names','Reports: formal pixel-perfect financial statements (P&L, Balance Sheet, variance analysis) for Board packs and audit. Management Reporting (Books): assembled multi-section report packages combining Reports, dashboards, and narrative — the complete monthly Board Pack artifact.','Management Reporting is for internal use; Reports is for external distribution','Reports handles data queries; Management Reporting handles text commentary only'],a:1,explain:'These are complementary layers. Reports produces individual formatted financial statements — the building blocks. Management Reporting (accessible via Library → Books) assembles multiple Reports, dashboards, and narrative sections into a single complete package — the CFO Board Pack. For Vision Corporation: Reports generates the 12-entity P&L, the FX bridge, and the headcount summary as individual outputs. Management Reporting assembles them into one Board Pack PDF with narrative commentary, distributed to the Board as a single artifact.'},
  {cat:'reporting',q:'Vision has built 20 FRS reports over 3 years. What is the recommended migration strategy to Reports, and what is the single highest-priority report to migrate first?',opts:['Migrate all 20 simultaneously over one weekend — all or nothing','Migrate the CFO Board Pack P&L first (highest visibility, highest urgency if something breaks in FRS), then group remaining by usage frequency, migrate Row Templates first to share across reports, leave low-traffic reports last','Migrate the simplest reports first to build confidence','Wait until FRS stops working, then migrate under deadline pressure'],a:1,explain:'Start with the highest-visibility, highest-risk report: the CFO Board Pack P&L. If FRS breaks this during a live Board cycle, the impact is severe. Migrating it to Reports first means the most critical report is protected. Then build shared Row and Column Templates that other reports can reference — template-first migration reduces total work by 60%. Group remaining 19 reports by usage frequency. Low-traffic reports (used once per year) can be migrated last. Never migrate under crisis pressure.'}

var currentFilter='all',filtered=[],qIdx=0,selected=null,checked=false,correct=0,total=0;

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fpill').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  initQuiz();
}

function initQuiz(){
  filtered=currentFilter==='all'?[...ALL_Q]:ALL_Q.filter(function(q){return q.cat===currentFilter});
  for(var i=filtered.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=filtered[i];filtered[i]=filtered[j];filtered[j]=t;}
  qIdx=0;selected=null;checked=false;correct=0;total=0;
  document.getElementById('score-panel').style.display='none';
  document.getElementById('quiz-body').style.display='block';
  document.getElementById('score-live').textContent='0 / 0';
  renderQ();
}

var CAT_LABELS={fundamentals:'FUNDAMENTALS',metadata:'METADATA & ESSBASE',groovy:'GROOVY SCRIPTING',workflow:'WORKFLOW & SECURITY',reporting:'REPORTING',fpa:'FP&A INTEGRATION'};

function renderQ(){
  if(qIdx>=filtered.length){showScore();return;}
  var q=filtered[qIdx];
  document.getElementById('qprog').style.width=(qIdx/filtered.length*100)+'%';
  document.getElementById('qprog-fill').style.width=(qIdx/filtered.length*100)+'%';
  document.getElementById('q-counter').textContent='Question '+(qIdx+1)+' of '+filtered.length;
  document.getElementById('q-frac').textContent='Score: '+correct+' / '+total;
  document.getElementById('qcat').textContent=CAT_LABELS[q.cat]||q.cat.toUpperCase();
  document.getElementById('qtext').textContent=q.q;
  var opts=document.getElementById('qopts');opts.innerHTML='';
  q.opts.forEach(function(opt,i){
    var d=document.createElement('div');d.className='qopt';d.textContent=opt;
    d.onclick=function(){selectOpt(i);};opts.appendChild(d);
  });
  document.getElementById('qexplain').style.display='none';
  document.getElementById('btn-check').style.display='inline-block';
  document.getElementById('btn-check').disabled=true;
  document.getElementById('btn-next').style.display='none';
  selected=null;checked=false;
  // Animate card
  var card=document.getElementById('qcard');card.style.animation='none';void card.offsetWidth;card.style.animation='fadeUp .25s ease';
}

function selectOpt(i){
  if(checked)return;
  selected=i;
  document.querySelectorAll('.qopt').forEach(function(el,j){el.classList.toggle('selected',j===i);});
  document.getElementById('btn-check').disabled=false;
}

function checkAnswer(){
  if(selected===null||checked)return;
  var q=filtered[qIdx];checked=true;total++;
  document.querySelectorAll('.qopt').forEach(function(el,i){
    el.style.cursor='default';
    if(i===q.a)el.classList.add('correct');
    else if(i===selected&&i!==q.a)el.classList.add('wrong');
  });
  if(selected===q.a)correct++;
  var exp=document.getElementById('qexplain');
  exp.textContent=q.explain;exp.style.display='block';
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='inline-block';
  document.getElementById('score-live').textContent=correct+' / '+total;
  document.getElementById('q-frac').textContent='Score: '+correct+' / '+total;
}

function nextQ(){qIdx++;renderQ();}

function showScore(){
  var pct=total>0?Math.round(correct/total*100):0;
  if(window.PQ)window.PQ.saveQuizScore(currentFilter,correct,total);
  document.getElementById('quiz-body').style.display='none';
  var sp=document.getElementById('score-panel');sp.style.display='block';
  document.getElementById('score-pct').textContent=pct+'%';
  document.getElementById('score-correct').textContent=correct;
  document.getElementById('score-wrong').textContent=(total-correct);
  document.getElementById('score-total').textContent=total;
  var msgs=[[100,'Perfect! You are a Planning Champion — claim your crown.'],[90,'Excellent! Near-mastery of EPBCS and FP&A integration.'],[70,'Good work — review the explanations for any missed questions.'],[50,'Keep practising — focus on the topics with the lowest scores.'],[0,'Keep studying — every Planning Champion started from zero.'],
  {cat:'groovy',q:'What is the correct guard chain order in a Groovy beforeSave script, and why does order matter?',opts:['null, noData, readOnly, edited','null, readOnly, noData, edited — this exact order because checking cell.edited before null crashes, and checking cell.data before noData gives wrong arithmetic','edited, null, readOnly, noData','readOnly, null, noData, edited'],a:1,explain:'Order is not optional. null must be first — checking any property on a null cell throws NullPointerException. readOnly second — writing to a readOnly cell silently fails without this guard. noData third — treating #Missing as 0 gives wrong arithmetic. edited last — skip unedited cells for performance and to prevent phantom side effects like false audit records.'},
  {cat:'groovy',q:'What does operation.parameter() always return regardless of RTP type, and what is the production consequence?',opts:['Integer if configured as Integer in Calculation Manager','String always — even Integer RTPs return a String. Without casting, "2024" + 1 = "20241" (string concatenation), not 2025. This silent arithmetic bug is the most common RTP mistake in production.','The type configured in Calculation Manager','Null if the user skips the prompt'],a:1,explain:'operation.parameter() always returns java.lang.String regardless of how the RTP was configured. The fix: always cast at declaration. def year = operation.parameter("Year") as Integer. Without this cast, arithmetic silently produces wrong results — "2025" + 1 = "20251" passes all runtime checks but writes garbage data to Essbase.'},
  {cat:'groovy',q:'Why should dense dimensions be placed in .columns() and NOT in .rows() when using DataGridBuilder?',opts:['It is a style preference with no performance impact','Dense dimensions in .rows() force Essbase to retrieve a separate block per member. Dense dimensions in .columns() are free — all column values load from the same block that was already retrieved for the sparse row key.','Dense dimensions in .columns() load faster because they use a different cache','columns() is limited to 10 members while rows() supports unlimited'],a:1,explain:'Essbase stores dense dimension members (Account, Period) inside each block. When you put a dense dimension in .rows(), DataGridBuilder must retrieve a new block for each dense member value — but they all live in the same block anyway. Placing dense dims in .columns() retrieves one block per sparse row key (e.g. Entity) and reads all Account values from that single block at no extra I/O cost. This is the difference between O(n) and O(n*m) block retrievals.'},
  {cat:'groovy',q:'A Groovy script sets operation.cancelled = true but the user sees a blank error dialog with no message. What is missing?',opts:['The script must call grid.save() before cancelling','operation.cancellationMessage was not set — or was set to an empty string. The save is blocked correctly but the user has no actionable information.','operation.cancelled must be set in afterSave not beforeSave','The cancellation requires a return statement in afterSave'],a:1,explain:'Setting operation.cancelled = true without operation.cancellationMessage produces either a blank dialog or a cryptic Java exception message. The correct pattern: always set both in the same block, include the specific value and entity in the message (e.g. "Revenue cannot be negative — you entered -5000 in Vision_EU"), then immediately return. The message quality is the difference between a planner understanding the issue and a helpdesk ticket at 9pm.'},
  {cat:'groovy',q:'What is the difference between AssertionError and Exception in Groovy EPM scripts?',opts:['They are identical — Groovy treats both the same way','assert throws AssertionError (for business rule precondition violations — user fixable). throw new Exception throws Exception (for system failures). Catch them separately: AssertionError cancel with user message; Exception log full stack and rethrow.','Exceptions can be caught; AssertionErrors cannot','AssertionError is only for null checks; Exception is for all other errors'],a:1,explain:'assert condition : "message" throws AssertionError — the correct mechanism for business precondition violations (invalid data, out-of-range year, wrong type). These are user-fixable conditions. throw new Exception is for unexpected system failures. In production error handlers, catch them separately: AssertionError sets operation.cancelled with the assert message shown to the user; Exception logs the full stack trace and rethrows — never swallow system exceptions.'},
  {cat:'fundamentals',q:'What is the difference between BSO and ASO in Essbase, and which is required for Planning data entry?',opts:['ASO is required for Planning because it supports write-back','BSO (Block Storage Option) is required for Planning — it supports write-back for data entry, Groovy scripting, business rules, and approval workflow. ASO (Aggregate Storage Option) is read-only, used for large consolidation reporting cubes.','They are interchangeable — either can be used for Planning','BSO is for small applications; ASO is for enterprise scale'],a:1,explain:'BSO and ASO are fundamentally different storage engines. BSO supports write-back (planners entering data), Groovy scripting, calculation scripts, and the approval workflow. It is the only option for Planning input cubes. ASO is optimised for large-scale read-only aggregations — no data entry, no Groovy, no approval workflow. Most EPBCS applications have BSO plan types for planning and optionally an ASO cube for consolidated reporting queries.'},
  {cat:'fundamentals',q:'What are the three application settings that cannot be changed after creation in EPBCS?',opts:['Number of dimensions, fiscal year, and security model','Base time period (Monthly vs Quarterly), fiscal year start month, and plan type names once data exists — all require a full application rebuild to change.','Currency, language, and time zone','Scenario names, version names, and entity structure'],a:1,explain:'Three irreversible settings: (1) Base time period — Monthly vs Quarterly defines the Period dimension structure. (2) Fiscal year start month — determines where Year members begin. (3) Plan type (cube) names once data exists — embedded in all forms, rules, DI configurations, and LCM snapshots. Getting any of these wrong means decommissioning the production environment and rebuilding from scratch. These must be formally signed off during discovery before any configuration begins.'},
  {cat:'fundamentals',q:'What is a Rolling Forecast and how does EPBCS support it using Substitution Variables?',opts:['A forecast that resets to zero at the start of each fiscal year','A forecast that always covers a fixed future horizon (e.g. 12 months) regardless of current date. EPBCS uses &CurPeriod SubVar to drive the rolling window — before CurPeriod = locked Actuals; from CurPeriod forward = editable Forecast.','A forecast that only covers the remaining months of the current fiscal year','A multi-scenario forecast showing best, base, and worst case'],a:1,explain:'A Rolling Forecast always looks 12 (or 18) months ahead regardless of the calendar position. In November, it covers December through next November. EPBCS implements this with Substitution Variables: &CurPeriod defines the boundary between loaded Actuals (locked, read-only) and open Forecast periods (editable). When the nightly EPM Automate batch advances &CurPeriod, all form columns shift automatically — the rolling window moves forward without any manual form changes.'},
  {cat:'fundamentals',q:'Vision Corp has 12 entities in 6 countries. Which application setting must be enabled at creation for multi-currency and cannot be added later?',opts:['Currency Translation can be enabled any time in Application Settings','Multi-Currency must be enabled during the Application Creation wizard — it cannot be added to an existing application. Enabling it post-creation requires a full application rebuild.','Multi-Currency is always enabled by default in EPBCS','Currency is handled at the reporting layer only, not in the application'],a:1,explain:'Multi-Currency is one of the irreversible application settings. Once an application is created without multi-currency, adding it later requires building a new application from scratch and migrating all data, metadata, forms, rules, and DI configurations. For Vision Corporation with 6 currencies (USD, EUR, GBP, JPY, AUD, CAD), multi-currency must be enabled in the Application Creation wizard on day one — before any other configuration. This is a discovery question that must be asked and answered before building begins.'}
,
  {cat:'metadata',q:'What is the difference between a Stored member and a Dynamic Calc member in Essbase, and when should you use each?',opts:['Stored members save faster; Dynamic Calc members load faster','Stored: value is physically written to disk after calculation — fast to read, uses storage. Dynamic Calc: value is recalculated on every query — zero storage cost but adds query time. Use Dynamic Calc for derived ratios (Gross Margin %) and high-level rollup members rarely queried.','Dynamic Calc members are only available in ASO cubes','Stored members are read-only; Dynamic Calc members are writable'],a:1,explain:'The Stored vs Dynamic Calc decision directly impacts application performance and storage. Stored members (like Account total parents) pre-calculate during CALC ALL and are fast to read. Dynamic Calc members recalculate on demand — ideal for Gross Margin %, Variance %, and rarely-queried rollup totals where recalculating on read is faster than storing and maintaining the value. Over-using Dynamic Calc on frequently-queried members degrades dashboard performance.'},
  {cat:'metadata',q:'What is an alias table in EPBCS and why would a large implementation have multiple alias tables?',opts:['Alias tables store Exchange Rates for currency translation','An alias table stores user-friendly display names for dimension members. Example: member name "E001" displays as "Vision US Operations". Multiple tables allow different audiences to see different labels — English aliases for Global Finance, French aliases for European users, Short aliases for Smart View column headers.','Alias tables replace member names entirely — the original names are deleted','A single alias table is the limit in EPBCS — multiple tables are not supported'],a:1,explain:'Alias tables provide display names without changing the underlying member name used in formulas and rules. E001 remains E001 in all code, but planners see "Vision US Operations". Multiple alias tables are valuable for: multilingual environments (English/French/German displays), role-based labels (Full name for reports vs abbreviated for Smart View), and migration projects where old names must be preserved while new business-friendly names are introduced progressively.'},
  {cat:'metadata',q:'What is a Smart List in EPBCS and give a practical example of its use in a planning form?',opts:['A Smart List is a pre-built library of member formulas','A Smart List is a custom drop-down selector attached to an account. Instead of entering a number, a planner selects from a defined list. Example: Headcount_Status account with options Active/On-Leave/Contractor. The selection stores as an integer but displays the label — enabling Groovy rules to branch logic based on status.','Smart Lists are only used for reporting, not data entry','A Smart List is a filtered view of dimension members for a specific form'],a:1,explain:'Smart Lists replace free-text or numeric-coded entries with controlled drop-downs, eliminating data quality issues. Practical example: an FTE_Type account with Smart List values of Permanent/Fixed-Term/Contractor. Planners select from the list rather than typing codes. The stored integer value (0/1/2) enables Groovy rules to apply different benefit rates per FTE type. This is how EPBCS implements structured categorical data entry within the numeric Essbase engine.'},
  {cat:'metadata',q:'What is the purpose of the "Never Share" data storage property, and how does it differ from a Shared member?',opts:['"Never Share" means the member is hidden from all users','Never Share: a base member tagged to prevent its data from being shared to another location in the hierarchy — useful when the same entity exists in two rollup paths but should count only once. Shared member: a pointer to a base member, displaying the same data in a second location. Never Share prevents accidental double-counting when an entity appears under two parents.','"Never Share" is identical to Dynamic Calc but for sparse dimensions','"Never Share" makes a member read-only across all forms'],a:1,explain:'In alternate hierarchies, an entity may roll up under both its legal entity parent and its management reporting parent. Without Never Share, its data would aggregate twice at the consolidated total. Marking the second occurrence as a Shared member (pointer) and the base as Never Share ensures data appears in both hierarchy views but counts only once in aggregation. This is essential for correct consolidation in multi-hierarchy dimensions like Entity.'},
  {cat:'metadata',q:'How do you implement a "Year-to-Date" (YTD) calculation in the Period dimension of EPBCS?',opts:['YTD is calculated automatically by EPBCS without any configuration','Add a YTD parent member under each quarter using the consolidation operator "+". Each month accumulates under its quarter, quarters accumulate under the YTD parent. Alternatively, use a separate YTD dimension or member formula: YTD_Revenue = @SUM(Jan:CurPeriod, Revenue).','YTD requires a separate Scenario member called YTD','YTD is only available in ASO cubes via MDX'],a:1,explain:'YTD is implemented in the Period dimension by designing hierarchy rollups (Jan + Feb + ... = Q1 YTD) or by member formulas using the @SUM range function. The most maintainable approach: design the Period dimension with both monthly leaf members and YTD/QTD parent members using "+" consolidation. Substitution variable &CurPeriod then drives dynamic YTD in forms and reports — the sum accumulates from Jan to CurPeriod automatically.'},
  {cat:'fpa',q:'What is forecast accuracy measurement (MAPE) in EPBCS and how do you build it?',opts:['MAPE is a standard KPI automatically generated by EPBCS','MAPE (Mean Absolute Percentage Error) measures how accurate each past forecast was vs actual. Build it: create a Forecast_Accuracy account with formula = ABS((Actual - Forecast) / Actual) * 100. Load historical forecast snapshots into a "Forecast_Archive" version. Run MAPE calculation comparing Archive vs Actual. Surface in a dashboard KPI.','MAPE is only available with the Advanced Predictions (25.08) module','MAPE calculation requires an external data science tool — it cannot be done in EPBCS'],a:1,explain:'MAPE is one of the most valuable FP&A metrics — it proves whether the forecasting process is improving. EPBCS implementation: (1) Create a Forecast_Archive version to capture the rolling forecast snapshot at period-end before actuals load. (2) Build member formula: MAPE = ABS((Actual - Forecast_Archive) / Actual) * 100. (3) A lower MAPE over time proves the forecast process is getting more accurate. Boards increasingly ask FP&A to report on forecast accuracy, not just the forecast itself.'},
  {cat:'fpa',q:'Vision Corp CFO wants a single "flash report" showing Month, QTD, and YTD for Budget vs Actual vs Variance by 9am on the first business day of each month. How do you automate this end-to-end in EPBCS?',opts:['Email the CFO a Smart View workbook they open manually each morning','Full automation: (1) DI loads prior month actuals at 2am. (2) CALC ALL runs at 3am. (3) EPM Automate runReportingObjectJobset "CFO_Flash_Pack" at 6am generates the report with live Month/QTD/YTD columns using SubVars. (4) Management Reporting Books distributes the PDF to the CFO distribution list. Zero manual steps.','Export data to Excel at month-end and manually build the report','Use Dashboard 2.0 and email the CFO a screenshot'],a:1,explain:'This is the canonical EPM automation pattern. The key components: Data Integration loads actuals (replaces manual journal download), CALC ALL ensures all aggregations and formulas are current, Reports with SubVar-driven columns (Month=&CurPeriod, QTD=YTD sum, YTD=Full YTD) generates consistent output, Management Reporting Books handles PDF generation and distribution. The CFO receives a consistent, accurate, zero-touch report every first business day. This is what eliminates the 2-day manual close pack preparation.'},
  {cat:'fpa',q:'What is driver-based headcount planning and how does it cascade to compensation cost automatically in EPBCS?',opts:['Planners enter compensation cost directly — headcount is just a reference number','Planners enter Headcount and assumption rates (Avg Salary, Benefit Rate, Payroll Tax Rate). Member formulas cascade automatically: Total_Salary = Headcount x Avg_Salary. Healthcare = Total_Salary x Benefit_Rate. Total_Compensation = Salary + Healthcare + Pension + Payroll_Tax. A Groovy rule triggers the cascade on form save. Smart Push moves Total_Compensation to the Financial cube.','Headcount drives only salary — benefits must be entered separately','Driver-based headcount requires the Workforce Planning module only — it cannot be done in Financial Planning'],a:1,explain:'Driver-based headcount planning is the most common Workforce implementation pattern. The planner enters one number (Headcount) and the system calculates 10-15 compensation line items automatically. The cascade chain: Headcount x Avg_Salary = Total_Salary. Total_Salary x Benefit_Rate = Healthcare_Cost. Total_Salary x Pension_Rate = Pension_Cost. The Groovy beforeSave rule fires when Headcount changes and recalculates all downstream lines instantly. Smart Push then synchronises the Total_Compensation total to the Financial Planning cube as Compensation_Expense — no manual data transfer between plan types.'}
];
